<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latihan 1: Komponen UI</title>
    <link rel="stylesheet" href="latihan-1.css">
</head>
<body>

    <div class="container">
        <h1>Latihan Styling Komponen UI</h1>

        <section>
            <h2>1. Komponen Tombol</h2>
            <button class="btn btn-primary">Primary</button>
            <button class="btn btn-secondary">Secondary</button>
            <button class="btn btn-danger">Danger</button>
            <button class="btn btn-outline">Outline</button>
        </section>

        <hr>

        <section>
            <h2>2. Komponen Badge</h2>
            <span class="badge badge-new">New</span>
            <span class="badge badge-sale">Sale</span>
            <span class="badge badge-trending">Trending</span>
        </section>

        <hr>

        <section>
            <h2>3. Komponen Alert Box</h2>
            <div class="alert alert-success">✅ Berhasil: Data telah disimpan!</div>
            <div class="alert alert-warning">⚠️ Perhatian: Cek kembali input Anda.</div>
            <div class="alert alert-error">❌ Error: Koneksi server terputus.</div>
        </section>
    </div>

</body>
</html>
