<!DOCTYPE html>
<html>
<head>
    <title>Belajar Tabel HTML</title>
    <style>
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-color: #dae2ea;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 50px;
}

h1 {
    color: #256e74;
    margin-bottom: 20px;
}

table {
    border-collapse: collapse; 
    width: 80%;
    background-color: #e8efe3;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1); 
    border-radius: 8px;
    overflow: hidden; 
}

thead {
    background-color: #516656; 
    color: white;
}

th, td {
    padding: 15px 20px;
    text-align: center;
    border-bottom: 1px solid #ddd;
}

tbody tr:nth-child(even) {
    background-color: #cfc7c7;
}

tbody tr:hover {
    background-color: #d4c2c2;
    transition: 0.3s;
}

tfoot {
    font-weight: bold;
    background-color: #fff6f6;
}

td:last-child {
    font-weight: bold;
}
    </style>
</head>
<body>

    <h1>Daftar Nilai Mahasiswa</h1>

    <table border="1" cellpadding="10" cellspacing="0">
        
        <thead>
            <tr>
                <th>No</th>
                <th>Nama Mahasiswa</th>
                <th>Nilai UTS</th>
                <th>Nilai UAS</th>
                <th>Nilai Akhir</th>
                <th>Grade</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td>1</td>
                <td>Amara Imanika</td>
                <td>80</td>
                <td>90</td>
                <td>85</td>
                <td>A</td>
            </tr>
            <tr>
                <td>2</td>
                <td>Adilla Salsabila</td>
                <td>70</td>
                <td>80</td>
                <td>75</td>
                <td>B</td>
            </tr>
            <tr>
                <td>3</td>
                <td>Destyna Silvira</td>
                <td>85</td>
                <td>85</td>
                <td>85</td>
                <td>A</td>
            </tr>
            <tr>
                <td>4</td>
                <td>Marcello</td>
                <td>60</td>
                <td>70</td>
                <td>65</td>
                <td>C</td>
            </tr>
            <tr>
                <td>5</td>
                <td>Khira Ulfia</td>
                <td>90</td>
                <td>90</td>
                <td>90</td>
                <td>A</td>
            </tr>
        </tbody>

        <tfoot>
            <tr>
                <th colspan="2">Rata-rata</th>
                <td>77</td>
                <td>83</td>
                <td>80</td>
                <td>-</td>
            </tr>
        </tfoot>

    </table>

</body>
</html>
